services:
  # -- LLM Inference (vLLM) ------------------------------------------------
  # OpenAI-compatible server. Serves /v1/chat/completions and /health on :8080,
  # so the URL contract with agent-api (http://secondbrain-llm:8080) is unchanged.
  llm:
    profiles: ["local-llm"]   # Only starts with: docker compose --profile local-llm up -d llm
    image: vllm/vllm-openai:v0.11.0
    container_name: secondbrain-llm
    restart: unless-stopped
    ipc: host
    command:
      - "--model=Qwen/Qwen3-14B-AWQ"
      - "--served-model-name=qwen3-14b"
      - "--quantization=awq_marlin"
      - "--dtype=float16"
      - "--max-model-len=32768"
      - "--max-num-seqs=4"
      - "--gpu-memory-utilization=0.85"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser=hermes"
      - "--reasoning-parser=qwen3"
      - "--host=0.0.0.0"
      - "--port=8080"
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=1
    volumes:
      - ~/data/SecondBrain/hf_cache:/root/.cache/huggingface
    networks:
      - llm_internal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 24G
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys;sys.exit(0 if urllib.request.urlopen(\"http://localhost:8080/health\",timeout=3).status==200 else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  # -- Agent API (FastAPI brain) -------------------------------------------
  # Long-running container. Code is deployed into it via GitHub Actions,
  # same pattern as pose-spatial-studio-backend.
  agent-api:
    image: python:3.12-slim
    container_name: secondbrain-agent-api
    restart: unless-stopped
    working_dir: /root/agent-api
    command: bash -c "pip install --break-system-packages -q -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --loop uvloop --http httptools --workers 1"
    environment:
      - LLM_URL=http://secondbrain-llm:8080
      - API_SECRET_KEY=${API_SECRET_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - LOG_LEVEL=warning
      - MAX_TOOL_CALLS_PER_TURN=5
      - MAX_INPUT_LENGTH=4096
      - RATE_LIMIT_PER_MINUTE=30
    volumes:
      - agent-api-code:/root/agent-api          # Code volume (populated by CI)
      - ./agent-api/data:/root/agent-api/data   # Persistent data (logs, db)
      - /var/run/docker.sock:/var/run/docker.sock  # Auto-start local LLM on fallback
    networks:
      - llm_internal
      - tunnel_network
    # Local LLM (vLLM) is the only provider. Start it with:
    #   docker compose --profile local-llm up -d llm
    # agent-api will auto-start it via the docker.sock mount if it goes down.

  # -- Cloudflare Tunnel ---------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: secondbrain-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - tunnel_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -- GPU Monitoring (optional) ---------------------------------------------
  # Exposes GPU metrics at :9400/metrics for Prometheus/Grafana.
  # Safe to remove if GPU monitoring is not needed.
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:latest
    container_name: secondbrain-dcgm
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "127.0.0.1:9400:9400"  # Localhost only — not exposed to internet
    networks:
      - llm_internal

networks:
  llm_internal:
    driver: bridge
    internal: true    # No internet access for LLM
  tunnel_network:
    driver: bridge

volumes:
  agent-api-code:     # Persists code between container restarts
