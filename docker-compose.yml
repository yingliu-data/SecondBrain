services:
  # -- LLM Inference (llama.cpp server) ------------------------------------
  # Official prebuilt image. PTX JIT-compiles to Blackwell on first run.
  # Confirmed working on RTX 5070 Ti / RTX PRO 6000 (compute capability 12.0).
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: secondbrain-llm
    restart: unless-stopped
    environment:
      - LLAMA_ARG_MODEL=/models/qwen3-14b-q4_k_m.gguf
      - LLAMA_ARG_MODEL_DRAFT=/models/qwen3-0.6b-q6_k.gguf
      - LLAMA_ARG_DRAFT_MAX=8
      - LLAMA_ARG_N_GPU_LAYERS=99
      - LLAMA_ARG_CTX_SIZE=8192
      - LLAMA_ARG_FLASH_ATTN=true
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_N_PARALLEL=1
    volumes:
      - ~/data/SecondBrain/models:/models:ro
    networks:
      - llm_internal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 24G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -- Agent API (FastAPI brain) -------------------------------------------
  # Long-running container. Code is deployed into it via GitHub Actions,
  # same pattern as pose-spatial-studio-backend.
  agent-api:
    image: python:3.12-slim
    container_name: secondbrain-agent-api
    restart: unless-stopped
    working_dir: /root/agent-api
    command: bash -c "pip install --break-system-packages -q -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --loop uvloop --http httptools --workers 1"
    environment:
      - LLM_URL=http://secondbrain-llm:8080
      - API_SECRET_KEY=${API_SECRET_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - LOG_LEVEL=warning
      - MAX_TOOL_CALLS_PER_TURN=5
      - MAX_INPUT_LENGTH=4096
      - RATE_LIMIT_PER_MINUTE=30
    volumes:
      - agent-api-code:/root/agent-api          # Code volume (populated by CI)
      - ./agent-api/data:/root/agent-api/data   # Persistent data (logs, db)
    networks:
      - llm_internal
      - tunnel_network
    depends_on:
      llm:
        condition: service_healthy

  # -- Cloudflare Tunnel ---------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: secondbrain-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - tunnel_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -- GPU Monitoring (optional) ---------------------------------------------
  # Exposes GPU metrics at :9400/metrics for Prometheus/Grafana.
  # Safe to remove if GPU monitoring is not needed.
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:latest
    container_name: secondbrain-dcgm
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "127.0.0.1:9400:9400"  # Localhost only — not exposed to internet
    networks:
      - llm_internal

networks:
  llm_internal:
    driver: bridge
    internal: true    # No internet access for LLM
  tunnel_network:
    driver: bridge

volumes:
  agent-api-code:     # Persists code between container restarts
