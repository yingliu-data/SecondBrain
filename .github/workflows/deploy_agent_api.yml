name: Deploy Agent API

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'agent-api/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy_agent_api.yml'
  push:
    branches:
      - main
    paths:
      - 'agent-api/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy_agent_api.yml'

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: agent-api/uv.lock

      - name: Run tests
        working-directory: agent-api
        env:
          API_SECRET_KEY: ci-test
        run: |
          uv sync --frozen
          uv run --frozen pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: agent-api
          platforms: linux/amd64
          # Only publish from main; PRs just prove the image builds.
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/yingliu-data/secondbrain-agent-api:latest
            ghcr.io/yingliu-data/secondbrain-agent-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Install cloudflared on the CI runner (NOT on your server).
      # The CI runner needs it to SSH through your existing Cloudflare tunnel.
      - name: Install cloudflared on CI runner
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/download/2025.4.2/cloudflared-linux-amd64 -o cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH to use Cloudflare tunnel
        env:
          SSH_HOSTNAME: ${{ secrets.SSH_HOSTNAME }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          cat << EOF >> ~/.ssh/config
          Host secondbrain
            HostName ${SSH_HOSTNAME}
            User ${SSH_USER}
            ProxyCommand cloudflared access ssh --hostname %h --id ${CF_ACCESS_CLIENT_ID} --secret ${CF_ACCESS_CLIENT_SECRET}
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH
        run: ssh -o StrictHostKeyChecking=accept-new secondbrain "echo 'SSH OK'"

      - name: Validate tenants.json on server
        # A malformed tenants.json is the one config error that hard-crashes
        # boot (json.loads at import). Fail here, while the old container is
        # still running, instead of shipping a crash loop. Missing file is OK
        # (app falls back to the default tenant).
        run: |
          ssh secondbrain '
            f=~/data/SecondBrain/agent-api/data/tenants.json
            if [ -f "$f" ]; then
              docker run --rm -v "$f":/tenants.json:ro python:3.12-slim \
                python -m json.tool /tenants.json > /dev/null \
                && echo "tenants.json: valid JSON"
            else
              echo "tenants.json: not present (default tenant only)"
            fi
          '

      - name: Sync docker-compose.yml
        run: scp docker-compose.yml secondbrain:~/data/SecondBrain/docker-compose.yml

      - name: Pull image and restart
        run: |
          ssh secondbrain "
            set -e
            cd ~/data/SecondBrain
            CONTAINER=secondbrain-agent-api

            docker compose pull agent-api
            docker compose up -d --no-deps agent-api

            echo '=== Health check (up to 2m) ==='
            HEALTHY=false
            for i in \$(seq 1 24); do
              sleep 5
              if docker exec \$CONTAINER python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' 2>/dev/null; then
                HEALTHY=true
                break
              fi
              echo \"Attempt \$i/24 — not ready yet\"
            done

            if \$HEALTHY; then
              echo 'Agent API is healthy!'
              docker exec \$CONTAINER python -c 'import urllib.request, sys; sys.stdout.write(urllib.request.urlopen(\"http://localhost:8000/health\").read().decode())'
              echo ''
              docker image prune -f > /dev/null
            else
              echo 'Health check failed after 2m!'
              docker logs --tail 50 \$CONTAINER
              exit 1
            fi
          "
