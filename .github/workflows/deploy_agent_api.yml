name: Deploy Agent API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'agent-api/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy_agent_api.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Install cloudflared on the CI runner (NOT on your server).
      # The CI runner needs it to SSH through your existing Cloudflare tunnel.
      - name: Install cloudflared on CI runner
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/download/2025.4.2/cloudflared-linux-amd64 -o cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH to use Cloudflare tunnel
        env:
          SSH_HOSTNAME: ${{ secrets.SSH_HOSTNAME }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          cat << EOF >> ~/.ssh/config
          Host secondbrain
            HostName ${SSH_HOSTNAME}
            User ${SSH_USER}
            ProxyCommand cloudflared access ssh --hostname %h --id ${CF_ACCESS_CLIENT_ID} --secret ${CF_ACCESS_CLIENT_SECRET}
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH
        run: ssh -o StrictHostKeyChecking=accept-new secondbrain "echo 'SSH OK'"

      - name: Deploy and restart
        run: |
          CONTAINER=secondbrain-agent-api

          # 1. Sync docker-compose.yml (startup command may have changed)
          scp docker-compose.yml secondbrain:~/data/SecondBrain/docker-compose.yml

          # 2. Upload code to server temp dir
          tar -czf - -C agent-api \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='data' \
            . \
          | ssh secondbrain "rm -rf /tmp/sb-deploy && mkdir -p /tmp/sb-deploy && tar -xzf - -C /tmp/sb-deploy/"

          # 3. Stop and remove old container, deploy code into volume, start fresh
          ssh secondbrain "
            set -e
            cd ~/data/SecondBrain
            CONTAINER=secondbrain-agent-api

            # Stop the container (handles restart loops)
            docker stop \$CONTAINER 2>/dev/null || true
            docker rm -f \$CONTAINER 2>/dev/null || true

            # Write code into the named volume via a temporary container.
            # This ensures code exists BEFORE the real container starts.
            VOLUME=\$(docker volume ls -q | grep agent-api-code | head -1)
            echo \"Volume: \$VOLUME\"
            docker run --rm \
              -v \$VOLUME:/data \
              -v /tmp/sb-deploy:/src:ro \
              python:3.12-slim \
              bash -c 'rm -rf /data/app /data/main.py && cp -r /src/. /data/'

            # Start the container (code is already in the volume)
            docker compose up -d --no-deps agent-api

            # Cleanup
            rm -rf /tmp/sb-deploy

            echo '=== Health check (waiting up to 5m for pip install + startup) ==='
            HEALTHY=false
            for i in \$(seq 1 60); do
              sleep 5
              if docker exec \$CONTAINER python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' 2>/dev/null; then
                HEALTHY=true
                break
              fi
              echo \"Attempt \$i/60 — not ready yet\"
            done

            if \$HEALTHY; then
              echo 'Agent API is healthy!'
              docker exec \$CONTAINER python -c 'import urllib.request, sys; sys.stdout.write(urllib.request.urlopen(\"http://localhost:8000/health\").read().decode())'
              echo ''
            else
              echo 'Health check failed after 5m!'
              docker logs --tail 50 \$CONTAINER
              exit 1
            fi
          "
